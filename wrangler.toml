name = "ghl-deal-ledger"
main = "index.js"
compatibility_date = "2024-09-01"

# No cron needed — triggered by GHL webhook POST to /webhook

# KV namespace binding
[[kv_namespaces]]
binding = "GHL_KV"
id = "20940742c3494b98a8475665e12f63b1"

# Observability — Worker logs & traces
[observability]
[observability.logs]
enabled = true
invocation_logs = true
[observability.traces]
enabled = false
