name = "ghl-deal-ledger"
main = "index.js"
compatibility_date = "2024-09-01"

# Runs every 5 minutes
[triggers]
crons = ["*/5 * * * *"]

# KV namespace binding — replace <YOUR_KV_NAMESPACE_ID> after creating it
[[kv_namespaces]]
binding = "GHL_KV"
id = "20940742c3494b98a8475665e12f63b1"

[observability]
[observability.logs]
enabled = true
invocation_logs = true
[observability.traces]
enabled = false
